[build]
  command       = "npm run build"
  publish       = "dist"
  functions     = "netlify/functions"

# Proxy /api/spotify to the serverless function
[[redirects]]
  from   = "/api/spotify"
  to     = "/.netlify/functions/spotify"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
